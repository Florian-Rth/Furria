services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: furria
      POSTGRES_PASSWORD: furria
      POSTGRES_DB: furria
    ports:
      - "5432:5432"
    volumes:
      # postgres:18 moved PGDATA below /var/lib/postgresql (versioned subdir) - mount the parent.
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U furria -d furria"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
