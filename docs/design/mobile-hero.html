<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FCC — Mobile Hero (Variante A · Foto-Cover)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #cfcbc4; }
  * { box-sizing: border-box; }
  @keyframes fcc-mq { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .fcc-mq { animation: fcc-mq 26s linear infinite; }
  .fcc-scroll { scrollbar-width: none; }
  .fcc-scroll::-webkit-scrollbar { display: none; }
  a { color: #E11D2A; }
  #stage { min-height: 100vh; display: flex; gap: 48px; align-items: flex-start; justify-content: center; padding: 48px 24px; flex-wrap: wrap; }
</style>
</head>
<body>
<div id="stage"><div id="light"></div><div id="dark"></div></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
// ── Konfetti-Kinetik theme (subset needed for the hero) ──────────────────
const KK = {
  light: { bg: '#FBF4E6', ink: '#1A1411', red: '#E11D2A', gold: '#F4B400', sub: 'rgba(26,20,17,0.62)', paper: '#FFFFFF', onRed: '#FFFFFF', line: 'rgba(26,20,17,0.14)' },
  dark:  { bg: '#15110E', ink: '#FBF4E6', red: '#FF3B47', gold: '#FFC42E', sub: 'rgba(251,244,230,0.6)', paper: '#221B16', onRed: '#FFFFFF', line: 'rgba(251,244,230,0.16)' },
};

// iOS status bar (light/dark tint via `color`)
function StatusBar({ color = '#1a1a1a', time = '20:11' }) {
  return (
    <div style={{ height: 50, padding: '0 28px 0 30px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', color, flexShrink: 0 }}>
      <span style={{ fontSize: 15, fontWeight: 700, letterSpacing: 0.3, fontFamily: '-apple-system, system-ui, sans-serif' }}>{time}</span>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
        <svg width="18" height="12" viewBox="0 0 18 12" fill={color}><rect x="0" y="7" width="3" height="5" rx="1" /><rect x="5" y="4.5" width="3" height="7.5" rx="1" /><rect x="10" y="2" width="3" height="10" rx="1" /><rect x="15" y="0" width="3" height="12" rx="1" /></svg>
        <svg width="17" height="12" viewBox="0 0 17 12" fill={color}><path d="M8.5 2.5c2.3 0 4.4.9 6 2.3l-1.4 1.5A6.6 6.6 0 0 0 8.5 4.5 6.6 6.6 0 0 0 3.9 6.3L2.5 4.8A8.6 8.6 0 0 1 8.5 2.5Z" /><path d="M8.5 6.6c1.2 0 2.3.5 3.1 1.2L8.5 11 5.4 7.8a4.6 4.6 0 0 1 3.1-1.2Z" /></svg>
        <svg width="26" height="13" viewBox="0 0 26 13" fill="none"><rect x="0.5" y="0.5" width="21" height="12" rx="3.2" stroke={color} strokeOpacity="0.5" /><rect x="2.2" y="2.2" width="16" height="8.6" rx="1.8" fill={color} /><rect x="23" y="4" width="2" height="5" rx="1" fill={color} fillOpacity="0.5" /></svg>
      </div>
    </div>
  );
}

// Phone frame (design chrome only — NOT part of the hero component)
function PhoneFrame({ children, screenBg = '#fff' }) {
  return (
    <div style={{ width: 400, height: 858, background: '#0b0b0d', borderRadius: 56, padding: 9, boxShadow: 'inset 0 0 2px 1px rgba(255,255,255,0.18)', position: 'relative' }}>
      <div style={{ width: '100%', height: '100%', background: screenBg, borderRadius: 48, overflow: 'hidden', position: 'relative', display: 'flex', flexDirection: 'column' }}>
        <div style={{ position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)', width: 116, height: 33, background: '#0b0b0d', borderRadius: 18, zIndex: 50 }} />
        {children}
      </div>
    </div>
  );
}
function HomeIndicator({ color }) { return <div style={{ position: 'absolute', bottom: 8, left: '50%', transform: 'translateX(-50%)', width: 134, height: 5, borderRadius: 3, background: color, zIndex: 60 }} />; }

// Striped image placeholder — REPLACE with a real <img> in production (see README)
function Placeholder({ h, label, c, tint }) {
  const t = tint || c.red;
  return (
    <div style={{ height: h, width: '100%', background: `repeating-linear-gradient(135deg, ${t}26, ${t}26 11px, ${t}10 11px, ${t}10 22px), ${c.paper}`, display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden' }}>
      <span style={{ fontFamily: 'ui-monospace, monospace', fontSize: 11, letterSpacing: 0.5, color: t, background: c.bg + 'cc', padding: '4px 9px', borderRadius: 5 }}>{label}</span>
    </div>
  );
}

// Pill buttons (soft elevation)
function LBtn({ c, children, primary, fs = 15 }) {
  if (primary) return <button style={{ border: 'none', background: c.red, color: c.onRed, fontFamily: 'Archivo, sans-serif', fontWeight: 800, fontSize: fs, padding: `${fs - 1}px ${fs * 1.6}px`, borderRadius: 50, cursor: 'pointer', boxShadow: '0 4px 14px rgba(26,20,17,0.12)' }}>{children}</button>;
  return <button style={{ border: '2px solid rgba(26,20,17,0.2)', background: 'transparent', color: c.ink, fontFamily: 'Archivo, sans-serif', fontWeight: 700, fontSize: fs - 1, padding: `${fs - 2}px ${fs * 1.45}px`, borderRadius: 50, cursor: 'pointer' }}>{children}</button>;
}

// Flat scrolling ticker
function LTicker({ c, fs = 15 }) {
  const item = (k) => (
    <span key={k} style={{ display: 'inline-flex', alignItems: 'center', gap: 20, fontFamily: "'Anton', sans-serif", fontSize: fs, letterSpacing: 1.5, color: c.onRed, paddingRight: 20 }}>
      GROSS FURRIA <span style={{ color: c.gold }}>✶</span> GROSSBESENSTADT <span style={{ color: c.gold }}>✶</span> SESSION 2026 <span style={{ color: c.gold }}>✶</span>
    </span>
  );
  return <div style={{ background: c.red, padding: `${fs * 0.65}px 0`, overflow: 'hidden' }}><div className="fcc-mq" style={{ display: 'flex', whiteSpace: 'nowrap', width: 'max-content' }}>{[0,1,2,3].map(item)}{[4,5,6,7].map(item)}</div></div>;
}

// ══════════════════════════════════════════════════════════════════════
// THE MOBILE HERO — this is the deliverable to reimplement.
// ══════════════════════════════════════════════════════════════════════
function MobileHero({ c }) {
  const H = 566; // hero height in px
  return (
    <div style={{ position: 'relative', height: H, flexShrink: 0, overflow: 'hidden' }}>
      {/* 1. full-bleed background photo */}
      <div style={{ position: 'absolute', inset: 0 }}>
        <Placeholder h={H} label="garde-auf-der-bühne" c={c} tint={c.red} />
      </div>
      {/* 2. legibility scrim (dark top for nav, dark bottom for headline) */}
      <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to bottom, rgba(20,15,12,0.58) 0%, rgba(20,15,12,0.12) 19%, rgba(20,15,12,0.12) 42%, rgba(20,15,12,0.72) 76%, rgba(20,15,12,0.94) 100%)' }} />
      {/* 3. overlay content column */}
      <div style={{ position: 'relative', height: '100%', display: 'flex', flexDirection: 'column' }}>
        <StatusBar color="#fff" />
        {/* transparent masthead nav */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr auto 1fr', alignItems: 'center', padding: '3px 20px 0' }}>
          <div style={{ justifySelf: 'start', display: 'flex', flexDirection: 'column', gap: 4, cursor: 'pointer' }}>{[0,1,2].map((i) => <div key={i} style={{ width: 22, height: 2.4, background: '#fff', borderRadius: 2 }} />)}</div>
          <div style={{ fontFamily: "'Anton', sans-serif", fontSize: 23, letterSpacing: 1.5, color: '#fff' }}>FURRIA</div>
          <button style={{ justifySelf: 'end', border: 'none', background: '#fff', color: c.red, fontFamily: 'Archivo, sans-serif', fontWeight: 800, fontSize: 12.5, padding: '8px 15px', borderRadius: 40, cursor: 'pointer' }}>Tickets</button>
        </div>
        <div style={{ flex: 1 }} />
        {/* headline block pinned to bottom edge of the photo */}
        <div style={{ padding: '0 22px 28px' }}>
          <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8, fontWeight: 800, fontSize: 11, letterSpacing: 2.2, color: '#fff', marginBottom: 13 }}>
            <span style={{ color: c.gold }}>★</span> SESSION 2026 · ERÖFFNUNG 11.11.
          </div>
          <h1 style={{ fontFamily: "'Anton', sans-serif", fontSize: 84, lineHeight: 0.8, letterSpacing: 0.5, margin: 0, textShadow: '0 4px 34px rgba(0,0,0,0.5)' }}>
            <span style={{ color: '#fff' }}>GROSS</span><br /><span style={{ color: c.red }}>FURRIA!</span>
          </h1>
        </div>
      </div>
    </div>
  );
}

// Function block that sits in the cream directly under the hero (tagline · CTAs · stats)
function HeroFollow({ c }) {
  return (
    <React.Fragment>
      <div style={{ padding: '22px 22px 6px' }}>
        <p style={{ fontSize: 15.5, fontWeight: 500, lineHeight: 1.5, color: c.sub, margin: 0 }}>Der Furrscher Carnevals Club lädt die <b style={{ color: c.ink, fontWeight: 700 }}>Großbesenstadt</b> zur fünften Jahreszeit — gebunden mit Herz, seit 1971.</p>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginTop: 18 }}>
          <LBtn c={c} primary fs={15}>Tickets sichern →</LBtn>
          <LBtn c={c} fs={14}>Programm</LBtn>
        </div>
        <div style={{ display: 'flex', gap: 14, marginTop: 22, paddingTop: 18, borderTop: `1px solid ${c.line}` }}>
          {[['180+','Mitglieder'],['12','Garden'],['1971','gegründet']].map(([b, sl], i) => (
            <div key={i} style={{ flex: 1 }}><div style={{ fontFamily: "'Anton', sans-serif", fontSize: 28, lineHeight: 1, color: c.red }}>{b}</div><div style={{ fontSize: 11, fontWeight: 600, color: c.sub, marginTop: 2 }}>{sl}</div></div>
          ))}
        </div>
      </div>
      <div style={{ marginTop: 22 }}><LTicker c={c} fs={15} /></div>
    </React.Fragment>
  );
}

function Screen({ mode }) {
  const c = KK[mode];
  return (
    <PhoneFrame screenBg={c.bg}>
      <div className="fcc-scroll" style={{ flex: 1, overflowY: 'auto', overflowX: 'hidden', display: 'flex', flexDirection: 'column' }}>
        <MobileHero c={c} />
        <HeroFollow c={c} />
      </div>
      <HomeIndicator color={c.ink} />
    </PhoneFrame>
  );
}

ReactDOM.createRoot(document.getElementById('light')).render(<Screen mode="light" />);
ReactDOM.createRoot(document.getElementById('dark')).render(<Screen mode="dark" />);
</script>
</body>
</html>
