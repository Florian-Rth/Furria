<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FCC Verein-Seite — Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #d8d4cc; font-family: Archivo, sans-serif; }
  * { box-sizing: border-box; }
  @keyframes fcc-mq { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @keyframes fcc-float { 0%, 100% { translate: 0 0; } 50% { translate: 0 -10px; } }
  @media (prefers-reduced-motion: no-preference) {
    .fcc-mq { animation: fcc-mq 26s linear infinite; }
    .fcc-floaty { animation: fcc-float 6s ease-in-out infinite; }
  }
  .fcc-scroll { scrollbar-width: none; -ms-overflow-style: none; }
  .fcc-scroll::-webkit-scrollbar { display: none; }
  a { color: #E11D2A; } a:hover { color: #B3101C; }
  .toolbar { position: sticky; top: 0; z-index: 100; display: flex; gap: 8px; align-items: center; padding: 12px 20px; background: #1A1411; color: #FBF4E6; }
  .toolbar b { font-family: 'Anton', sans-serif; letter-spacing: 1px; font-size: 18px; margin-right: 12px; }
  .toolbar button { border: 2px solid #FBF4E6; background: transparent; color: #FBF4E6; font-family: Archivo, sans-serif; font-weight: 800; font-size: 13px; padding: 6px 14px; cursor: pointer; border-radius: 4px; }
  .toolbar button.on { background: #E11D2A; border-color: #E11D2A; }
  .frame { display: flex; justify-content: center; padding: 32px; }
  .desk { width: 1300px; max-width: 100%; box-shadow: 0 24px 60px rgba(0,0,0,0.25); }
</style>
</head>
<body>
<div class="toolbar">
  <b>FCC · VEREIN-SEITE</b>
  <button id="b-desktop" class="on" onclick="setDevice('desktop')">Desktop</button>
  <button id="b-mobile" onclick="setDevice('mobile')">Mobile</button>
  <span style="width:16px"></span>
  <button id="b-light" class="on" onclick="setMode('light')">Hell</button>
  <button id="b-dark" onclick="setMode('dark')">Dunkel</button>
</div>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="src/fcc-logos.jsx"></script>
<script type="text/babel" src="src/fcc-shared.jsx"></script>
<script type="text/babel" src="src/fcc-theme.jsx"></script>
<script type="text/babel" src="src/fcc-ds-club-v2.jsx"></script>
<script type="text/babel">
let state = { device: 'desktop', mode: 'light' };
function render() {
  const { ClubV2 } = window;
  const el = state.device === 'mobile'
    ? <div className="frame"><ClubV2 mode={state.mode} device="mobile" /></div>
    : <div className="frame"><div className="desk"><ClubV2 mode={state.mode} device="desktop" /></div></div>;
  ReactDOM.createRoot(document.getElementById('root')).render(el);
}
window.setDevice = (d) => { state.device = d; document.getElementById('b-desktop').classList.toggle('on', d==='desktop'); document.getElementById('b-mobile').classList.toggle('on', d==='mobile'); render(); };
window.setMode = (m) => { state.mode = m; document.getElementById('b-light').classList.toggle('on', m==='light'); document.getElementById('b-dark').classList.toggle('on', m==='dark'); render(); };
render();
</script>
</body>
</html>
